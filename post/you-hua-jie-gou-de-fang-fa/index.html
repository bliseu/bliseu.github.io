            <div class="post-content" v-pre>
              <p>使用ISMEAR=0来优化结构，可能可以避免少数结构的能量过于不合理。目前，多原子体系仍存在mlpp之后的多原子体系空间群变为1，这个问题calypso似乎解决了，USPEX也存在这个问题。<br>
对于多原子体系，似乎应减少mlpp的概率（减为0.3？），让随机的结构再多一点，而mlpp容易得到一批结果差不多的结构，影响整体效率。</p>
